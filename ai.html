    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .phone {
      width: min(393px, 100%);
      padding: 10px;
      border-radius: 54px;
      background: linear-gradient(180deg, #555963, #111317);
      box-shadow: 0 28px 80px rgba(16, 20, 30, .28);
    }
    .screen {
      position: relative;
      aspect-ratio: 1179 / 2556;
      border-radius: 46px;
      overflow: hidden;
      background: var(--bg);
    }
    .island {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 34px;
      background: #090a0d;
      border-radius: 999px;
      z-index: 5;

    .safe {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
    }
    .safe::-webkit-scrollbar { display: none; }
    body.flat .wrap {
      min-height: 100vh;
      display: block;
      padding: 0;
    }
    body.flat .phone {
      width: min(393px, 100%);
      margin: 0 auto;
      padding: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }
    body.flat .screen {
      aspect-ratio: auto;
      min-height: 100vh;
      border-radius: 0;
      overflow: visible;
      background: transparent;
    }
    body.flat .island { display: none; }
    body.flat .safe {
      height: auto;
      min-height: 100vh;
      overflow: visible;

      top: 2px;

      height: 4px;

      height: 7px;

    .history-panel {

      border: 1px solid #ebeef3;
      background: #f8fafc;
      color: #6f7782;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;

    .weekday {

    .day {

      font-weight: 600;

    .day.disabled {

      cursor: not-allowed;
    }
    .day.today { border-color: rgba(234,47,34,.24); color: #cf2c21; }

      right: 6px;
      top: 5px;
      font-size: 10px;
      font-weight: 700;
      color: #cf2c21;

      left: 50%;
      bottom: 7px;
      transform: translateX(-50%);

        history: {
          "2026-04-23": [{ time: "10:02", code: "300760.SZ" }, { time: "09:56", code: "300750.SZ" }, { time: "09:51", code: "603986.SH" }, { time: "09:46", code: "688111.SH" }, { time: "09:33", code: "300059.SZ" }, { time: "09:25", code: "601899.SH" }, { time: "09:19", code: "600938.SH" }, { time: "09:12", code: "688981.SH" }],
          "2026-04-22": [{ time: "11:16", code: "300059.SZ" }, { time: "10:38", code: "688981.SH" }, { time: "09:58", code: "601899.SH" }],
          "2026-04-21": [{ time: "14:28", code: "688111.SH" }, { time: "10:14", code: "600938.SH" }, { time: "09:48", code: "300760.SZ" }],
          "2026-04-18": [{ time: "10:11", code: "300750.SZ" }, { time: "09:27", code: "603986.SH" }],
          "2026-04-15": [{ time: "13:45", code: "300059.SZ" }, { time: "10:32", code: "601899.SH" }],
          "2026-04-08": [{ time: "09:22", code: "300750.SZ" }, { time: "09:10", code: "300760.SZ" }],
          "2026-03-27": [{ time: "10:36", code: "603986.SH" }, { time: "09:18", code: "600938.SH" }]
        }
      }
    };

    const els = {
      backBtn: document.getElementById("backBtn"),
      historyBtn: document.getElementById("historyBtn"),
      historyPanel: document.getElementById("historyPanel"),
      calendarWrap: document.getElementById("calendarWrap"),
      calendarToggle: document.getElementById("calendarToggle"),
      prevMonth: document.getElementById("prevMonth"),
      nextMonth: document.getElementById("nextMonth"),
      monthLabel: document.getElementById("monthLabel"),
      calendar: document.getElementById("calendar"),
      selectedDateLabel: document.getElementById("selectedDateLabel"),
      toolbarDate: document.getElementById("toolbarDate"),
      main: document.querySelector(".main"),
      mainList: document.getElementById("mainList"),
      historyList: document.getElementById("historyList")
    };

    function findByCode(tab, code) {
      return db[tab].items.find((x) => x.code === code) || {};
    }

    function monthLabel(key) {
      const [y, m] = key.split("-");
      return `${y}年${Number(m)}月`;
    }

    function shiftMonth(key, delta) {
      const [y, m] = key.split("-").map(Number);
      const d = new Date(y, m - 1 + delta, 1);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    }

    function buildDetailHref(item, historyMode = false, shortTime = "") {
      const displayDate = historyMode
        ? state.selectedDate.slice(5).replace("-", "/")
        : TODAY.slice(5).replace("-", "/");
      const displayTime = historyMode
        ? shortTime
        : String(item.time || "").replace(" 推送", "");
      const query = new URLSearchParams({
        src: "ai",
        name: item.name || "",
        code: item.code || "",
        time: `${displayDate} ${displayTime}`,
        analysis: item.analysis || ""
      });
      return `./insight-detail.html?${query.toString()}`;
    }

    function renderCard(item, historyMode = false, shortTime = "") {
      const detailHref = buildDetailHref(item, historyMode, shortTime);
      if (historyMode) {
        return `
        <article class="card">
          <div class="card-head">
            <div>
              <div class="name-row">
                <div class="stock-name">${item.name}</div>
                <button class="diag-btn" type="button">算法诊股</button>
              </div>
              <div class="stock-code">${item.code}</div>
            </div>
            <div class="history-time"><span>${shortTime} 推送</span></div>
          </div>
          <div class="metrics">
            <div class="metric"><div class="metric-label">最新价</div><div class="metric-value">${item.price}</div></div>
            <div class="metric"><div class="metric-label">市盈(TTM)</div><div class="metric-value">${item.pe}</div></div>
            <div class="metric"><div class="metric-label">市值</div><div class="metric-value">${item.cap}</div></div>
          </div>
          <div class="analysis">
            <div class="analysis-copy"><span class="analysis-label">AI分析：</span><span class="analysis-text">${item.analysis}</span></div>
            <a class="detail" href="${detailHref}">查看详情 &gt;</a>
          </div>
        </article>
      `;
      }
      return `
        <article class="card">
          <div class="card-head">
            <div>
              <div class="name-row">
                <div class="stock-name">${item.name}</div>
                <button class="diag-btn" type="button">算法诊股</button>
              </div>
              <div class="stock-code">${item.code}</div>
            </div>
            <div class="push-time">${item.time}</div>
          </div>
          <div class="metrics">
            <div class="metric"><div class="metric-label">最新价</div><div class="metric-value">${item.price}</div></div>
            <div class="metric"><div class="metric-label">市盈(TTM)</div><div class="metric-value">${item.pe}</div></div>
            <div class="metric"><div class="metric-label">市值</div><div class="metric-value">${item.cap}</div></div>
          </div>
          <div class="analysis">
            <div class="analysis-copy"><span class="analysis-label">AI分析：</span><span class="analysis-text">${item.analysis}</span></div>
            <a class="detail" href="${detailHref}">查看详情 &gt;</a>
          </div>
        </article>
      `;
    }

    function renderMain() {
      els.mainList.innerHTML = db[state.tab].items.map((item) => renderCard(item, false)).join("");
    }

    function renderHistoryList() {
      const rows = db[state.tab].history[state.selectedDate] || [];
      const showInlineDate = !(state.historyMode && state.selectedDate && state.selectedDate !== TODAY);
      els.selectedDateLabel.textContent = showInlineDate
        ? (state.selectedDate ? `${state.selectedDate} 历史记录` : "暂无历史记录")
        : "";
      if (!rows.length) {
        els.historyList.innerHTML = `<div class="empty">该日期暂无推送记录</div>`;
        return;
      }
      els.historyList.innerHTML = rows.map((row) => {
        const item = findByCode(state.tab, row.code);
        return renderCard(item, true, row.time);
      }).join("");
    }

    function renderCalendar() {
      const available = new Set(Object.keys(db[state.tab].history));
      const [y, m] = state.month.split("-").map(Number);
      els.monthLabel.textContent = monthLabel(state.month);
      const firstDay = new Date(y, m - 1, 1).getDay();
      const days = new Date(y, m, 0).getDate();
      const html = [];
      for (let i = 0; i < firstDay; i++) html.push(`<button class="day muted" disabled></button>`);
      for (let d = 1; d <= days; d++) {
        const key = `${state.month}-${String(d).padStart(2, "0")}`;
        const has = available.has(key);
        const cls = ["day"];
        if (!has) cls.push("disabled");
        if (has) cls.push("has-record");
        if (key === TODAY) cls.push("today");
        if (key === state.selectedDate) cls.push("selected");
        html.push(`<button class="${cls.join(" ")}" data-date="${key}" ${has ? "" : "disabled"}>${d}</button>`);
      }
      els.calendar.innerHTML = html.join("");
      els.calendar.querySelectorAll("[data-date]").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.selectedDate = btn.dataset.date;
          state.calendarCollapsed = true;
          renderCalendar();
          renderHistoryList();
          renderCalendarVisibility();
        });
      });
    }

    function renderCalendarVisibility() {
      els.calendarWrap.classList.toggle("collapsed", state.calendarCollapsed);
      els.calendarToggle.textContent = state.calendarCollapsed ? "展开日历" : "收起日历";
    }

    function ensureSelectedDate() {
      const dates = Object.keys(db[state.tab].history).sort();
      if (!dates.includes(state.selectedDate)) state.selectedDate = dates[dates.length - 1] || "";
      if (state.selectedDate) state.month = state.selectedDate.slice(0, 7);
    }

    function renderAll() {
      ensureSelectedDate();
      renderMain();
      renderCalendar();
      renderHistoryList();
      renderCalendarVisibility();
      els.historyPanel.classList.toggle("open", state.historyMode);
      els.main.classList.toggle("hidden", state.historyMode);
      els.historyBtn.textContent = state.historyMode ? "返回当前列表" : "按时间查看历史";
      els.toolbarDate.innerHTML = state.historyMode && state.selectedDate && state.selectedDate !== TODAY
        ? `${state.selectedDate} 历史记录`
        : `<strong>今日筛选</strong>&nbsp;04/23`;
    }

    els.backBtn.addEventListener("click", () => {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "./index.html?v=20260423";
      }
    });
    els.historyBtn.addEventListener("click", () => {
      state.historyMode = !state.historyMode;
      if (!state.historyMode) state.calendarCollapsed = false;
      renderAll();
    });
    els.calendarToggle.addEventListener("click", () => {
      state.calendarCollapsed = !state.calendarCollapsed;
      renderCalendarVisibility();
    });
    els.prevMonth.addEventListener("click", () => { state.month = shiftMonth(state.month, -1); renderCalendar(); });
    els.nextMonth.addEventListener("click", () => { state.month = shiftMonth(state.month, 1); renderCalendar(); });

    renderAll();
  </script>
</body>
</html>
